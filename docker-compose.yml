version: '3.9'
services:
  ai-chabox-be:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '${APP_PORT}:${CONTAINER_PORT}'
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - chatboxnet
  postgresql:
    image: pgvector/pgvector:pg17
    env_file:
      - .env
    ports:
      - '${POSTGRES_PORT}:${POSTGRES_CONTAINER_PORT}'
    networks:
      - chatboxnet
    volumes:
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
      - chatboxdata:/app/data
networks:
  chatboxnet:
    driver: bridge
volumes:
  chatboxdata:
